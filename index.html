        });

        const totalMins = (GRID_END_HOUR - GRID_START_HOUR) * 60;
        container.style.gridTemplateRows = HEADER_HT + "px repeat(" + (totalMins/5) + ", " + (5 * PIXELS_PER_MIN) + "px)";

        for(let h = GRID_START_HOUR; h < GRID_END_HOUR; h++) {
            [0, 30].forEach(m => {
                const rowStart = Math.floor(((h * 60 + m) - (GRID_START_HOUR * 60)) / 5) + 2;
                const timeDiv = document.createElement('div');
                timeDiv.className = 'time-slot';
                timeDiv.innerHTML = "<span>" + h + ":" + m.toString().padStart(2, '0') + "</span>";
                timeDiv.style.gridColumn = 1; timeDiv.style.gridRow = rowStart + " / span 6";
                container.appendChild(timeDiv);
                const line = document.createElement('div');
                line.className = 'grid-line'; line.style.gridRow = rowStart;
                container.appendChild(line);
            });
        }

        rawData.filter(function(i) { return i.d === day; }).forEach(function(item) {
            const range = getStartEndMins(item.t);
            const startOffset = range.start - (GRID_START_HOUR * 60);
            if (startOffset < 0) return;
            const rowStart = Math.floor(startOffset / 5) + 2;
            const span = Math.ceil((range.end - range.start) / 5);
            const id = item.d + "-" + item.a;

            const div = document.createElement('div');
            div.className = 'artist-block';
            div.id = "artist-" + id;
            if (wishlist.has(id)) div.classList.add('wishlisted');
            if (highlightId === id) div.classList.add('search-highlight');
            
            div.style.gridColumn = STAGES.indexOf(item.s) + 2;
            div.style.gridRow = rowStart + " / span " + span;
            div.innerHTML = '<div class="artist-time">' + item.t + '</div>' + item.a;
            div.onclick = function() { openModal(item, id); };
            container.appendChild(div);
            
            if (highlightId === id) {
                setTimeout(() => {
                    div.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                    setTimeout(() => div.classList.remove('search-highlight'), 3000);
                }, 100);
            }
        });
    }

    function toggleSearch(show) {
        document.getElementById('search-overlay').style.display = show ? 'flex' : 'none';
        if (show) document.getElementById('search-input').focus();
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const resultsBox = document.getElementById('search-results');
        resultsBox.innerHTML = '';
        if (!query) return;

        const matches = rawData.filter(i => i.a.toLowerCase().includes(query));
        matches.forEach(item => {
            const div = document.createElement('div');
            div.className = 'search-item';
            div.innerHTML = `<div class="search-item-name">${item.a}</div><div class="search-item-info">${item.d} • ${item.s} • ${item.t}</div>`;
            div.onclick = () => {
                const id = item.d + "-" + item.a;
                toggleSearch(false);
                switchDay(item.d, id);
            };
            resultsBox.appendChild(div);
        });
    }

    function openModal(item, id) {
        selectedArtistId = id;
        document.getElementById('m-artist').textContent = item.a;
        document.getElementById('m-info').textContent = item.s + " • HKT " + item.t;
        document.getElementById('btn-spotify').href = "https://open.spotify.com/search/" + encodeURIComponent(item.a);
        const wlBtn = document.getElementById('btn-wishlist');
        if (wishlist.has(id)) { wlBtn.textContent = "Remove from My Schedule"; wlBtn.classList.add('remove'); } 
        else { wlBtn.textContent = "Add to My Schedule"; wlBtn.classList.remove('remove'); }
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function toggleCurrentWishlist() {
        if (wishlist.has(selectedArtistId)) wishlist.delete(selectedArtistId);
        else wishlist.add(selectedArtistId);
        localStorage.setItem('coachella26_vFinal', JSON.stringify(Array.from(wishlist)));
        renderSchedule(currentDay);
        closeModal();
    }

    function clearWishlist() {
        if(confirm("Clear your custom schedule?")) {
            wishlist.clear(); localStorage.setItem('coachella26_vFinal', '[]'); renderSchedule(currentDay);
        }
    }

    function updateTimeLine() {
        const now = new Date();
        const mins = now.getHours() * 60 + now.getMinutes();
        const offset = mins - (GRID_START_HOUR * 60);
        const line = document.getElementById('current-time-line');
        if (offset >= 0 && offset <= (GRID_END_HOUR - GRID_START_HOUR) * 60) {
            line.style.display = 'block'; line.style.top = (HEADER_HT + offset * PIXELS_PER_MIN) + "px";
        } else { line.style.display = 'none'; }
    }

    function switchDay(day, highlightId = null) {
        currentDay = day;
        var tabs = document.querySelectorAll('.tab');
        for(var i=0; i<tabs.length; i++) { tabs[i].classList.toggle('active', tabs[i].textContent.indexOf(day) !== -1); }
        renderSchedule(day, highlightId);
        updateTimeLine();
    }

    const today = new Date().toLocaleDateString('en-US', { weekday: 'short' });
    switchDay(['Sat','Sun','Mon'].indexOf(today) !== -1 ? today : 'Sat');
    setInterval(updateTimeLine, 60000);
</script></body></html>
